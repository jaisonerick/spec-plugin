name: Bump version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip-bump]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Find all local plugins that had file changes
          CHANGED_PLUGINS=""
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            if echo "$CHANGED" | grep -q "^plugins/${plugin_name}/"; then
              CHANGED_PLUGINS="${CHANGED_PLUGINS:+$CHANGED_PLUGINS }${plugin_name}"
            fi
          done
          echo "changed_plugins=$CHANGED_PLUGINS" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED" | grep -qE '^\.claude-plugin/|^README\.md$|^CLAUDE\.md$'; then
            echo "marketplace_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "marketplace_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump plugin versions
        if: steps.changes.outputs.changed_plugins != ''
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' HEAD)
          BUMPED_PLUGINS=""

          for plugin_name in ${{ steps.changes.outputs.changed_plugins }}; do
            MANIFEST="plugins/${plugin_name}/.claude-plugin/plugin.json"
            if [ ! -f "$MANIFEST" ]; then
              echo "Skipping ${plugin_name}: no plugin.json found"
              continue
            fi

            CURRENT=$(jq -r '.version // "0"' "$MANIFEST")
            # Strip leading 'v' if present
            CURRENT_NUM=${CURRENT#v}
            NEW_VERSION="v$(( CURRENT_NUM + 1 ))"

            jq --arg v "$NEW_VERSION" '.version = $v' "$MANIFEST" > tmp.json
            mv tmp.json "$MANIFEST"
            echo "Bumped ${plugin_name}: ${CURRENT} → ${NEW_VERSION}"
            BUMPED_PLUGINS="${BUMPED_PLUGINS:+$BUMPED_PLUGINS, }${plugin_name} ${NEW_VERSION}"
          done

          echo "BUMPED_PLUGINS=$BUMPED_PLUGINS" >> "$GITHUB_ENV"

      - name: Bump marketplace version
        if: steps.changes.outputs.marketplace_changed == 'true'
        run: |
          CURRENT=$(jq -r '.metadata.version // "0"' .claude-plugin/marketplace.json)
          CURRENT_NUM=${CURRENT#v}
          NEW_VERSION="v$(( CURRENT_NUM + 1 ))"
          jq --arg v "$NEW_VERSION" '.metadata.version = $v' .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json
          echo "MARKETPLACE_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "Bumped marketplace: $CURRENT → $NEW_VERSION"

      - name: Update CHANGELOG
        if: steps.changes.outputs.changed_plugins != '' || steps.changes.outputs.marketplace_changed == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          COMMIT_MSG=$(git log -1 --format='%s' HEAD)
          ENTRY=""

          if [ -n "${BUMPED_PLUGINS:-}" ]; then
            for plugin_name in ${{ steps.changes.outputs.changed_plugins }}; do
              MANIFEST="plugins/${plugin_name}/.claude-plugin/plugin.json"
              if [ -f "$MANIFEST" ]; then
                VERSION=$(jq -r '.version' "$MANIFEST")
                ENTRY="${ENTRY}## [Plugin: ${plugin_name} ${VERSION}] - ${DATE}\n\n### Changed\n- ${COMMIT_MSG}\n\n"
              fi
            done
          fi

          if [ -n "${MARKETPLACE_VERSION:-}" ]; then
            ENTRY="${ENTRY}## [Marketplace ${MARKETPLACE_VERSION}] - ${DATE}\n\n### Changed\n- ${COMMIT_MSG}\n\n"
          fi

          # Insert before the first existing version entry
          awk -v entry="$ENTRY" '
            /^## \[/ && !inserted {
              printf entry
              inserted=1
            }
            { print }
          ' CHANGELOG.md > tmp_changelog.md
          mv tmp_changelog.md CHANGELOG.md

      - name: Commit and push
        if: steps.changes.outputs.changed_plugins != '' || steps.changes.outputs.marketplace_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PARTS=""
          [ -n "${BUMPED_PLUGINS:-}" ] && PARTS="$BUMPED_PLUGINS"
          [ -n "${MARKETPLACE_VERSION:-}" ] && PARTS="${PARTS:+$PARTS, }marketplace ${MARKETPLACE_VERSION}"

          git add "plugins/"*"/.claude-plugin/plugin.json" .claude-plugin/marketplace.json CHANGELOG.md
          git commit -m "chore: bump ${PARTS} [skip-bump]"
          git push
